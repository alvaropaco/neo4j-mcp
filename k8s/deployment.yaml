apiVersion: v1
kind: Secret
metadata:
  name: neo4j-mcp-secrets
  namespace: openclaw-instance-1
type: Opaque
stringData:
  NEO4J_URI: "bolt://openclaw-instance-1-neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-mcp
  namespace: openclaw-instance-1
  labels:
    app: neo4j-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-mcp
  template:
    metadata:
      labels:
        app: neo4j-mcp
    spec:
      containers:
        - name: neo4j-mcp
          image: neo4j-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: neo4j-mcp-secrets
                  key: NEO4J_URI
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: neo4j-mcp-secrets
                  key: NEO4J_USER
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-mcp-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_DATABASE
              value: "neo4j"
            - name: NEO4J_MCP_TRANSPORT
              value: "streamable-http"
            - name: NEO4J_MCP_HOST
              value: "0.0.0.0"
            - name: NEO4J_MCP_PORT
              value: "8080"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-mcp
  namespace: openclaw-instance-1
spec:
  selector:
    app: neo4j-mcp
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-mcp-nodeport
  namespace: openclaw-instance-1
spec:
  type: NodePort
  selector:
    app: neo4j-mcp
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30840